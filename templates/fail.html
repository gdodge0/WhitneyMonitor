<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page_title|safe }}</title>
  <style>
    :root {
      --brand: #0060df;
      --text-dark: #1a1a1a;
      --text-light: #54667a;
      --bg: #f2f5fa;
      --surface: #ffffff;
      --radius: 0.75rem;
      --shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    /* Reset & typography */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      color: var(--text-dark);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .container {
      max-width: 720px;
      margin: 4rem auto 6rem;
      padding: 0 1.25rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem 2rem 2.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--brand);
      text-align: center;
    }

    p.lead {
      font-size: 1.05rem;
      color: var(--text-light);
      text-align: center;
      margin-bottom: 2rem;
    }

    /* Stepper */
    .step {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }

    .step-number {
      flex-shrink: 0;
      background: var(--brand);
      color: #fff;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.15rem;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .step-content h3 {
      font-size: 1.25rem;
      margin-bottom: 0.35rem;
    }

    .step-content p {
      color: var(--text-light);
      font-size: 0.95rem;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.85rem;
      color: var(--text-light);
    }

    /* Responsive tweaks */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121921;
        --surface: #17212b;
        --text-dark: #e8e8e8;
        --text-light: #8ca3b6;
        --shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
      }
      .step-number {
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <article class="card" aria-labelledby="title">
      <h1 id="title">{{ section_title|safe }}</h1>
      <p class="lead">{{ section_text|safe }}</p>
    </article>
  </main>
</body>
</html>
